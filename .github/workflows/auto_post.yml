name: AutoPost News

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run main.py
        env:
          TG_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHAT_ID_DRAFT: ${{ secrets.DRAFT_CHAT_ID }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}

        run: python src/main.py

      - name: Commit and push updated sent_log.json and cache.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_log.json cache.json
          git commit -m "Update sent_log.json and cache.json" || echo "No changes"
          git push
